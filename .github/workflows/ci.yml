name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: scripts/test-installer.sh
      - name: Smoke test standalone executable
        run: |
          set -euo pipefail
          bin/workflow-bootstrap.cjs --version
          mkdir -p tmp/ci-smoke
          git -C tmp/ci-smoke init -q -b main
          bin/workflow-bootstrap.cjs init tmp/ci-smoke --yes
          bin/workflow-bootstrap.cjs check tmp/ci-smoke
