name: Release executable

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - run: npm run check
      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${VERSION}." >&2
            exit 1
          fi
      - name: Create checksum
        run: cd bin && sha256sum workflow-bootstrap.cjs > workflow-bootstrap.cjs.sha256
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            bin/workflow-bootstrap.cjs \
            bin/workflow-bootstrap.cjs.sha256 \
            --verify-tag \
            --generate-notes \
            --title "workflow-bootstrap $GITHUB_REF_NAME"
