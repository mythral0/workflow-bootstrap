name: Release native executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            asset: workflow-bootstrap-linux-x64
          - runner: ubuntu-24.04-arm
            asset: workflow-bootstrap-linux-arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          package-manager-cache: false
      - run: npm ci
      - run: npm run check
      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${VERSION}." >&2
            exit 1
          fi
      - name: Build native executable
        run: scripts/build-native.sh "release/${{ matrix.asset }}"
      - name: Create checksum
        working-directory: release
        run: sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
      - name: Prepare portable release assets
        if: ${{ matrix.asset == 'workflow-bootstrap-linux-x64' }}
        run: |
          cp bin/workflow-bootstrap.cjs release/workflow-bootstrap.cjs
          VERSION="$(node -p "require('./package.json').version")"
          printf '%s\n' "$VERSION" > release/workflow-bootstrap.version
          cd release
          sha256sum workflow-bootstrap.cjs > workflow-bootstrap.cjs.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            release/${{ matrix.asset }}
            release/${{ matrix.asset }}.sha256
          if-no-files-found: error
          retention-days: 1
      - uses: actions/upload-artifact@v7
        if: ${{ matrix.asset == 'workflow-bootstrap-linux-x64' }}
        with:
          name: workflow-bootstrap-portable
          path: |
            release/workflow-bootstrap.cjs
            release/workflow-bootstrap.cjs.sha256
            release/workflow-bootstrap.version
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/workflow-bootstrap-linux-x64 \
            release/workflow-bootstrap-linux-x64.sha256 \
            release/workflow-bootstrap-linux-arm64 \
            release/workflow-bootstrap-linux-arm64.sha256 \
            release/workflow-bootstrap.cjs \
            release/workflow-bootstrap.cjs.sha256 \
            release/workflow-bootstrap.version \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "workflow-bootstrap $GITHUB_REF_NAME"
